<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
        <title>todo-app</title>
    </head>
    <body
        class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">
        <!-- <div id="app"></div> -->

        <div
            class="bg-slate-800 p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
            <h1
                class="text-3xl font-bold text-center mb-6 text-transparent bg-clip-text bg-linear-to-r from-cyan-400 to-blue-500">
                Todo App
            </h1>

            <form id="todo-form" class="flex gap-2 mb-6">
                <input
                    type="text"
                    id="todo-input"
                    placeholder="Add a new task..."
                    class="flex-1 bg-slate-700 border border-slate-600 rounded-xl px-4 py-2 text-white focus:outline-none focus:border-cyan-400 transition-colors"
                    required />
                <button
                    type="submit"
                    class="bg-linear-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-medium px-4 py-2 rounded-xl transition-all shadow-md active:scale-95 cursor-pointer">
                    Add
                </button>
            </form>

            <ul
                id="todo-list"
                class="space-y-3 max-h-87.5 overflow-y-auto pr-1"></ul>

            <div
                class="mt-6 pt-4 border-t border-slate-700 flex justify-between items-center text-sm text-slate-400">
                <span id="todo-stats">Total: 0 | Completed: 0</span>
                <button
                    id="clear-completed"
                    class="hover:text-red-400 transition-colors hidden border p-2 rounded cursor-pointer">
                    Clear Completed
                </button>
            </div>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
